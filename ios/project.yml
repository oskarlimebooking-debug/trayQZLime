name: LimePrintBridge
options:
  bundleIdPrefix: com.limebooking
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: sl
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""               # Fill in via Xcode (Signing & Capabilities)
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.limebooking.printbridge
    INFOPLIST_FILE: LimePrintBridge/Info.plist
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIApplicationSceneManifestGenerationDisabled: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  LimePrintBridge:
    type: application
    platform: iOS
    sources:
      - path: LimePrintBridge
    info:
      path: LimePrintBridge/Info.plist
      properties:
        CFBundleDisplayName: Lime Print Bridge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        NSBluetoothAlwaysUsageDescription: Za tiskanje računov se app poveže z BLE termalnim printerjem.
        NSBluetoothPeripheralUsageDescription: Za tiskanje računov se app poveže z BLE termalnim printerjem.
        UIBackgroundModes:
          - bluetooth-central
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: Lime Booking lahko skenira QR za stranke.
        UIRequiredDeviceCapabilities:
          - bluetooth-le
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
